<style type="text/css">
  /* Hide copy-to-clipboard buttons on code blocks */
  .copy-to-clipboard {
    display: none !important;
  }
  /* Images: no lightbox click (featherlight wrap) */
  #body-inner a[data-featherlight] {
    pointer-events: none;
    cursor: default;
  }

    padding: 0 !important;
  }
